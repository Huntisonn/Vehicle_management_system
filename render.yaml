# Render Blueprint Specification for RentiGo MVP
services:
  # 1. Express API Backend
  - type: web
    name: rentigo-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # User will set this in Render dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true # Render will generate a safe secret automatically
      - key: JWT_REFRESH_SECRET
        generateValue: true # Render will generate a safe secret automatically

  # 2. React SPA Frontend
  - type: web
    name: rentigo-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # Redirect all routes to index.html for React Router SPA
      - type: rewrite
        source: /*
        destination: /index.html
